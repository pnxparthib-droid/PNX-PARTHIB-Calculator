<!DOCTYPE html>
<html>
<head>
    <title>PNX PARTHIB Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: Arial; }
        .calc { background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        #display { width: 100%; height: 50px; text-align: right; margin-bottom: 15px; font-size: 20px; padding: 5px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { height: 50px; width: 50px; border-radius: 10px; border: 1px solid #ddd; cursor: pointer; }
        .op { background: #ff9500; color: white; }
    </style>
</head>
<body>
    <div class="calc">
        <h3 style="text-align:center">PNX PARTHIB</h3>
        <input id="display" readonly>
        <div class="grid">
            <button onclick="c()">C</button>
            <button onclick="p('/')">/</button>
            <button onclick="p('*')">*</button>
            <button onclick="p('-')">-</button>
            <button onclick="p('7')">7</button>
            <button onclick="p('8')">8</button>
            <button onclick="p('9')">9</button>
            <button class="op" onclick="p('+')">+</button>
            <button onclick="p('4')">4</button>
            <button onclick="p('5')">5</button>
            <button onclick="p('6')">6</button>
            <button class="op" onclick="e()">=</button>
            <button onclick="p('1')">1</button>
            <button onclick="p('2')">2</button>
            <button onclick="p('3')">3</button>
            <button onclick="p('0')">0</button>
        </div>
    </div>
    <script>
        let d = document.getElementById('display');
        function p(v) { d.value += v; }
        function c() { d.value = ''; }
        function e() { try { d.value = eval(d.value); } catch { d.value = 'Error'; } }
    </script>
</body>
</html>
